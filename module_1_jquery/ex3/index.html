<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 3 - jQuery Methods</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      max-width: 700px;
      margin: 50px auto;
      padding: 0 24px;
      background: #fafafa;
      color: #333;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 28px;
      letter-spacing: -0.5px;
    }
    .box {
      width: 140px;
      height: 140px;
      background: #3d5a80;
      border-radius: 8px;
      display: inline-block;
      margin: 0 10px 20px 0;
      vertical-align: top;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 24px;
    }
    button {
      padding: 9px 18px;
      border: 2px solid #3d5a80;
      background: #fff;
      color: #3d5a80;
      font-size: 0.88rem;
      font-family: inherit;
      cursor: pointer;
      border-radius: 4px;
      font-weight: 600;
      transition: background 0.15s, color 0.15s;
    }
    button:hover {
      background: #3d5a80;
      color: #fff;
    }
  </style>
</head>
<body>
  <h1>jQuery Methods Demo</h1>

  <div class="box" id="box1"></div>
  <div class="box" id="box2"></div>
  <div class="box" id="box3"></div>

  <div class="controls">
    <button id="btnHide">Hide All</button>
    <button id="btnShow">Show All</button>
    <button id="btnFadeOut">Fade Out All</button>
    <button id="btnFadeIn">Fade In All</button>
    <button id="btnToggle">Toggle All</button>
    <button id="btnChain">Slide Up → Delay → Slide Down</button>
  </div>

  <script>
    $(document).ready(function () {
      $('#btnHide').click(function () {
        $('.box').hide();
      });

      $('#btnShow').click(function () {
        $('.box').show();
      });

      $('#btnFadeOut').click(function () {
        $('.box').fadeOut(600);
      });

      $('#btnFadeIn').click(function () {
        $('.box').fadeIn(600);
      });

      $('#btnToggle').click(function () {
        $('.box').toggle();
      });

      $('#btnChain').click(function () {
        $('.box').slideUp(500).delay(1000).slideDown(500);
      });
    });
  </script>
</body>
</html>
