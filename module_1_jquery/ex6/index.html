<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 6 - Event Helpers</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    body {
      font-family: 'Verdana', sans-serif;
      max-width: 620px;
      margin: 50px auto;
      padding: 0 24px;
      background: #f0f4f8;
      color: #222;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 28px;
    }
    #eventBox {
      width: 100%;
      padding: 28px 20px;
      background: #dbeafe;
      border: 2px solid #93c5fd;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 20px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
      min-height: 60px;
      line-height: 1.6;
    }
    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }
    label {
      font-size: 0.9rem;
      font-weight: bold;
      white-space: nowrap;
    }
    #keyInput {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #93c5fd;
      border-radius: 4px;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      background: #fff;
      transition: border-color 0.2s;
    }
    #keyInput:focus {
      border-color: #3b82f6;
    }
    #keyOutput {
      padding: 12px 16px;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 0.95rem;
      min-height: 40px;
      color: #555;
    }
    .legend {
      font-size: 0.78rem;
      color: #666;
      margin-top: 20px;
      border-top: 1px solid #ccc;
      padding-top: 14px;
      line-height: 2;
    }
  </style>
</head>
<body>
  <h1>Event Helpers</h1>

  <div id="eventBox">Interact with me!</div>

  <div class="input-row">
    <label for="keyInput">Type here:</label>
    <input type="text" id="keyInput" placeholder="Press any key..." />
  </div>
  <div id="keyOutput">Waiting for key press...</div>

  <div class="legend">
    <strong>Single click</strong> — turns box orange &nbsp;|&nbsp;
    <strong>Double click</strong> — turns box green &nbsp;|&nbsp;
    <strong>Mouse enter</strong> — turns box blue &nbsp;|&nbsp;
    <strong>Mouse leave</strong> — resets box &nbsp;|&nbsp;
    <strong>Key press</strong> — shown below input
  </div>

  <script>
    $(document).ready(function () {
      $('#eventBox').click(function () {
        $(this).css('background', '#fed7aa').css('border-color', '#fb923c').text('Clicked!');
      });

      $('#eventBox').dblclick(function () {
        $(this).css('background', '#bbf7d0').css('border-color', '#4ade80').text('Double Clicked!');
      });

      $('#eventBox').mouseenter(function () {
        $(this).css('background', '#bfdbfe').css('border-color', '#60a5fa').text('Mouse Entered!');
      });

      $('#eventBox').mouseleave(function () {
        $(this).css('background', '#dbeafe').css('border-color', '#93c5fd').text('Mouse Left!');
      });

      $('#keyInput').keypress(function (e) {
        $('#keyOutput').text('Key pressed: "' + String.fromCharCode(e.which) + '" (code: ' + e.which + ')');
      });
    });
  </script>
</body>
</html>
