<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 5 - Working with Events</title>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    body {
      font-family: 'Trebuchet MS', sans-serif;
      max-width: 560px;
      margin: 60px auto;
      padding: 0 24px;
      background: #1c1c1c;
      color: #f0f0f0;
    }
    h1 {
      font-size: 1.6rem;
      color: #f0f0f0;
      margin-bottom: 30px;
    }
    #colorBox {
      width: 100%;
      height: 200px;
      background: #ffffff;
      border-radius: 8px;
      margin-bottom: 24px;
      transition: background 0.4s ease;
      border: 3px solid #444;
    }
    #colorBtn {
      display: block;
      width: 100%;
      padding: 14px;
      background: #e74c3c;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    #colorBtn:hover {
      background: #c0392b;
    }
    .hint {
      margin-top: 14px;
      font-size: 0.82rem;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Event Handling</h1>

  <div id="colorBox"></div>
  <button id="colorBtn">Click to Turn Red</button>
  <p class="hint">Double-click the box to reset to white</p>

  <script>
    $(document).ready(function () {
      $('#colorBtn').click(function () {
        $('#colorBox').css('background', 'red');
      });

      $('#colorBox').dblclick(function () {
        $(this).css('background', 'white');
      });
    });
  </script>
</body>
</html>
